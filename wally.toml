[package]
name = "kartzrbx/dataservicev2"
description = """
High-performance Roblox data service with typed path tokens, ProfileStore persistence, and QuickNet replication.

Features:
- Generic typed templates with chainable Paths tokens (DataService.Paths.Currencies.Coins)
- Server/client singleton API with automatic replication and Janitor cleanup
- Transient overlay API (SetTransient, UpdateTransient, ClearTransient) for admin/test panels:
  changes appear in Get() and replicate to the client, but are NOT saved to ProfileStore
- Persisted reads via GetPersisted() vs merged reads via Get()
- Ordered list queries: GetOrderedList() and GetOrderedListWithPriority() with Enum.OrderList.Asc / Enum.OrderList.Desc
- Bundled dependencies (signal, quicknet, janitor) — no extra Wally deps required in consuming games
"""
version = "2.3.3"
license = "MIT"
authors = ["KartzRBX"]
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
exclude = ["**"]
include = ["src", "src/**", "default.project.json", "wally.lock", "wally.toml"]


[dependencies]
